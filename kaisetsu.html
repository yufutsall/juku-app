<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入試解説動画 — 高校受験対策</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f5f4f0; --surface:#fff; --surface2:#f0ede6;
    --border:#dedad2; --border-strong:#ccc9c0;
    --text:#1a1915; --text2:#6b6760; --text3:#a09d97;
    --accent:#1d6f4f; --accent-light:#e8f5ee; --accent-mid:#2d9e72;
    --blue:#1a5276; --blue-light:#eaf2f8;
    --font:'Noto Sans JP',sans-serif; --mono:'DM Mono',monospace;
    --radius:8px; --radius-lg:12px; --sidebar-w:240px; --topbar-h:56px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; line-height:1.6; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

  /* ── SETUP SCREEN ── */
  .setup-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
  .setup-screen.hidden { display:none; }
  .setup-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:40px; width:440px; max-width:95vw; box-shadow:0 8px 40px rgba(0,0,0,0.08); }
  .setup-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
  .setup-logo i { font-size:28px; color:var(--accent); }
  .setup-logo span { font-size:18px; font-weight:700; }
  .setup-label { font-size:12px; font-weight:500; color:var(--text2); margin-bottom:5px; }
  .setup-input { width:100%; font-family:var(--font); font-size:13px; color:var(--text); border:1px solid var(--border); border-radius:var(--radius); background:var(--surface2); padding:10px 14px; outline:none; margin-bottom:14px; transition:border-color 0.15s; }
  .setup-input:focus { border-color:var(--accent); background:var(--surface); }
  .setup-btn { width:100%; padding:11px; border-radius:var(--radius); background:var(--accent); color:white; font-size:14px; font-weight:500; border:none; cursor:pointer; font-family:var(--font); margin-bottom:10px; transition:opacity 0.15s; }
  .setup-btn:hover { opacity:0.88; }
  .setup-note { font-size:11px; color:var(--text3); text-align:center; line-height:1.6; }
  .setup-error { font-size:12px; color:#c0392b; margin-bottom:10px; display:none; }

  /* ── HEADER ── */
  .header { height:var(--topbar-h); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:16px; flex-shrink:0; }
  .header-logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; }
  .header-logo i { color:var(--accent); font-size:20px; }
  .header-logo span { color:var(--text3); font-weight:400; font-size:12px; margin-left:4px; }
  .header-spacer { flex:1; }
  .header-search { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:6px 12px; min-width:180px; }
  .header-search i { font-size:14px; color:var(--text3); }
  .header-search input { border:none; background:transparent; font-family:var(--font); font-size:12px; color:var(--text); outline:none; width:100%; }
  .header-search input::placeholder { color:var(--text3); }

  /* ── LAYOUT ── */
  .layout { display:flex; flex:1; overflow:hidden; }

  /* ── SIDEBAR ── */
  .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
  .sidebar-scroll { flex:1; overflow-y:auto; padding:10px 0 20px; }
  .sidebar-scroll::-webkit-scrollbar { width:4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .tree-row { display:flex; align-items:center; gap:6px; padding:6px 12px; cursor:pointer; font-size:13px; color:var(--text2); border-left:2px solid transparent; transition:background 0.1s,color 0.1s; user-select:none; }
  .tree-row:hover { background:var(--surface2); color:var(--text); }
  .tree-row.active { background:var(--accent-light); color:var(--accent); border-left-color:var(--accent); font-weight:500; }
  .tree-row .chevron { font-size:12px; transition:transform 0.15s; flex-shrink:0; color:var(--text3); }
  .tree-row.open .chevron { transform:rotate(90deg); }
  .tree-row .row-icon { font-size:14px; flex-shrink:0; }
  .tree-row .row-label { flex:1; }
  .tree-children { display:none; }
  .tree-children.open { display:block; }
  .l1 { padding-left:12px; }
  .l2 { padding-left:24px; font-size:12px; }
  .l3 { padding-left:36px; font-size:12px; }

  /* ── MAIN ── */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .content-header { padding:14px 24px; border-bottom:1px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .breadcrumb { flex:1; display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text2); flex-wrap:wrap; }
  .breadcrumb .bc-name { color:var(--text); font-weight:500; }
  .breadcrumb .sep { color:var(--text3); font-size:11px; }
  .subject-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }
  .content-area { flex:1; overflow-y:auto; padding:32px 40px; display:flex; align-items:flex-start; justify-content:center; }
  .content-area::-webkit-scrollbar { width:5px; }
  .content-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  .video-grid { width:100%; max-width:560px; }

  /* ── PLAYER CARD ── */
  .player-display { width:100%; border-radius:20px; overflow:hidden; background:var(--surface); box-shadow:0 2px 16px rgba(0,0,0,0.07); border:1px solid var(--border); }
  .player-screen { position:relative; width:100%; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer; }
  .thumb-math     { background:#dff0e5; }
  .thumb-english  { background:#dce8f5; }
  .thumb-japanese { background:#f5e0de; }
  .thumb-science  { background:#d6e8f5; }
  .thumb-social   { background:#f5e8d0; }
  .thumb-default  { background:#e8e5de; }
  .thumb-label { position:absolute; top:14px; left:14px; font-size:13px; font-weight:700; padding:5px 12px; border-radius:8px; }
  .play-circle { width:60px; height:60px; border-radius:50%; background:rgba(255,255,255,0.95); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 16px rgba(0,0,0,0.13); transition:transform 0.13s; }
  .player-screen:hover .play-circle { transform:scale(1.07); }
  .play-circle i { font-size:24px; color:var(--accent); margin-left:3px; }
  .dur-badge { position:absolute; bottom:14px; right:14px; font-size:13px; font-family:var(--mono); font-weight:500; background:rgba(20,20,20,0.65); color:#fff; padding:3px 10px; border-radius:6px; }
  .progress-bar { height:3px; background:var(--accent-mid); width:100%; }
  .player-info { padding:16px 18px 20px; }
  .player-info-title { font-size:16px; font-weight:500; color:var(--text); margin-bottom:10px; line-height:1.4; }
  .player-info-meta { display:flex; align-items:center; gap:10px; font-size:13px; color:var(--text3); }
  .player-info-meta span { display:flex; align-items:center; gap:4px; }

  /* ── EMPTY / LOADING ── */
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:60px 20px; color:var(--text3); text-align:center; }
  .empty-state i { font-size:40px; }
  .empty-state p { font-size:13px; line-height:1.6; }
  .loading { display:flex; align-items:center; justify-content:center; padding:60px; color:var(--text3); gap:10px; font-size:13px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }

  /* ── TOAST ── */
  .toast { position:fixed; bottom:24px; right:24px; z-index:500; background:var(--text); color:white; padding:10px 18px; border-radius:var(--radius); font-size:13px; font-weight:500; transform:translateY(80px); opacity:0; transition:all 0.25s; display:flex; align-items:center; gap:8px; }
  .toast.show { transform:translateY(0); opacity:1; }

  /* ── MOBILE MENU BUTTON ── */
  .menu-btn { display:none; align-items:center; justify-content:center; width:36px; height:36px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface2); cursor:pointer; flex-shrink:0; }
  .menu-btn i { font-size:18px; color:var(--text2); }

  /* ── OVERLAY ── */
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:200; }
  .sidebar-overlay.show { display:block; }

  /* ── RESPONSIVE ── */
  @media (max-width:640px) {
    body { overflow:auto; height:auto; min-height:100vh; }
    .layout { overflow:visible; flex-direction:column; }

    /* Header */
    .header { padding:0 14px; gap:10px; }
    .header-logo span { display:none; }
    .header-search { min-width:0; flex:1; }
    .menu-btn { display:flex; }

    /* Sidebar → drawer */
    .sidebar {
      position:fixed; top:0; left:0; bottom:0; z-index:300;
      width:80vw; max-width:300px;
      transform:translateX(-100%);
      transition:transform 0.25s ease;
      box-shadow:4px 0 20px rgba(0,0,0,0.12);
    }
    .sidebar.open { transform:translateX(0); }

    /* Main */
    .main { flex:1; overflow:visible; min-height:0; }
    .content-header { padding:12px 16px; }
    .content-area { padding:16px; overflow:visible; }
    .video-grid { max-width:100%; }

    /* Player */
    .player-display { border-radius:12px; }
    .player-info-title { font-size:14px; }
  }

</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-card">
    <div class="setup-logo">
      <i class="ti ti-school"></i>
      <span>入試解説動画 — 初期設定</span>
    </div>
    <div class="setup-label">Supabase URL</div>
    <input class="setup-input" id="setupUrl" type="url" placeholder="https://xxxx.supabase.co">
    <div class="setup-label">Supabase Anon Key</div>
    <input class="setup-input" id="setupKey" type="text" placeholder="eyJhbGciOiJIUzI1NiIs...">
    <div class="setup-error" id="setupError"></div>
    <button class="setup-btn" onclick="saveSetup()">保存して始める</button>
    <div class="setup-note">
      この情報はブラウザのローカルストレージに保存されます。<br>
      設定方法は同梱の <strong>README.md</strong> をご覧ください。
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="menu-btn" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></div>
  <div class="header-logo">
    <i class="ti ti-school"></i>
    入試解説動画
    <span>高校受験対策</span>
  </div>
  <div class="header-search">
    <i class="ti ti-search"></i>
    <input type="text" id="searchInput" placeholder="動画を検索..." oninput="renderVideos()">
  </div>
  <div class="header-spacer"></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-scroll" id="sidebarTree"></div>
  </div>
  <div class="main">
    <div class="content-header">
      <div class="breadcrumb">
        <span class="bc-name" id="bc-school">—</span>
        <span class="sep">›</span>
        <span class="bc-name" id="bc-year">—</span>
        <span class="sep">›</span>
        <span class="subject-badge" id="bc-subject-badge">—</span>
      </div>
    </div>
    <div class="content-area">
      <div class="video-grid" id="videoGrid">
        <div class="loading"><div class="spinner"></div> 読み込み中...</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL_KEY = 'juku_supabase_url';
const SUPABASE_KEY_KEY = 'juku_supabase_key';

const SUBJECTS = [
  { key:'math',              label:'数学',          icon:'ti-math-function',     cls:'thumb-math',     color:'#1d6f4f', bg:'#e8f5ee' },
  { key:'english',           label:'英語',          icon:'ti-abc',               cls:'thumb-english',  color:'#1a5276', bg:'#eaf2f8' },
  { key:'english_listening', label:'英語リスニング', icon:'ti-headphones',        cls:'thumb-english',  color:'#1a5276', bg:'#eaf2f8' },
  { key:'japanese',          label:'国語',          icon:'ti-language-hiragana', cls:'thumb-japanese', color:'#922b21', bg:'#fbeaf0' },
  { key:'science',           label:'理科',          icon:'ti-flask',             cls:'thumb-science',  color:'#1a4e8f', bg:'#d6eaf8' },
  { key:'social',            label:'社会',          icon:'ti-globe',             cls:'thumb-social',   color:'#7d5a1e', bg:'#fdf6e3' },
];
const subjectMap = {};
SUBJECTS.forEach(s => subjectMap[s.key] = s);

let supabaseClient = null;
let schools = [];
let videos  = {};
let currentSel = { schoolId:null, yearId:null, subjectKey:null };

// ── SETUP ──
function saveSetup() {
  const url = document.getElementById('setupUrl').value.trim();
  const key = document.getElementById('setupKey').value.trim();
  const err = document.getElementById('setupError');
  if (!url || !key) { err.textContent='URLとKeyを入力してください'; err.style.display='block'; return; }
  localStorage.setItem(SUPABASE_URL_KEY, url);
  localStorage.setItem(SUPABASE_KEY_KEY, key);
  err.style.display='none';
  initApp(url, key);
}

function initApp(url, key) {
  supabaseClient = window.supabase.createClient(url, key);
  document.getElementById('setupScreen').classList.add('hidden');
  loadData();
}

window.addEventListener('load', () => {
  const url = localStorage.getItem(SUPABASE_URL_KEY);
  const key = localStorage.getItem(SUPABASE_KEY_KEY);
  if (url && key) initApp(url, key);
});

// ── LOAD DATA ──
async function loadData() {
  try {
    const [schoolsRes, yearsRes, videosRes] = await Promise.all([
      supabaseClient.from('schools').select('*').order('sort_order'),
      supabaseClient.from('school_years').select('*').order('year', { ascending:false }),
      supabaseClient.from('videos').select('*'),
    ]);
    if (schoolsRes.error) throw schoolsRes.error;

    schools = (schoolsRes.data || []).map(sc => ({
      ...sc,
      subjects: sc.subjects || [],
      years: (yearsRes.data || [])
        .filter(y => y.school_id === sc.id)
        .map(y => ({ ...y, subjects: y.subjects || [] }))
    }));

    videos = {};
    (videosRes.data || []).forEach(v => {
      videos[`${v.school_year_id}__${v.subject_key}`] = v;
    });

    if (schools.length > 0 && schools[0].years.length > 0 && schools[0].subjects.length > 0) {
      currentSel = {
        schoolId:   schools[0].id,
        yearId:     schools[0].years[0].id,
        subjectKey: schools[0].subjects[0],
      };
    }
    renderTree();
    applySelection();
  } catch(e) {
    document.getElementById('videoGrid').innerHTML =
      `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>データ読み込みに失敗しました。<br>Supabaseの設定を確認してください。<br><small>${e.message}</small></p></div>`;
  }
}

// ── TREE ──
function renderTree() {
  const container = document.getElementById('sidebarTree');
  container.innerHTML = '';
  schools.forEach(school => {
    const node = document.createElement('div');
    const isSchoolOpen = school.id === currentSel.schoolId;
    node.innerHTML = `
      <div class="tree-row l1 ${isSchoolOpen?'open':''}" onclick="toggleTree(this,'s_${school.id}')">
        <i class="ti ti-chevron-right chevron"></i>
        <i class="ti ti-building-community row-icon"></i>
        <span class="row-label">${school.name}</span>
      </div>
      <div class="tree-children ${isSchoolOpen?'open':''}" id="s_${school.id}">
        ${school.years.map(yr => {
          const isYearOpen = currentSel.schoolId===school.id && currentSel.yearId===yr.id;
          const subs = (yr.subjects && yr.subjects.length>0) ? yr.subjects : school.subjects;
          return `
          <div>
            <div class="tree-row l2 ${isYearOpen?'open':''}" onclick="toggleTree(this,'y_${yr.id}')">
              <i class="ti ti-chevron-right chevron"></i>
              <i class="ti ti-calendar row-icon"></i>
              <span class="row-label">${yr.year}年度</span>
            </div>
            <div class="tree-children ${isYearOpen?'open':''}" id="y_${yr.id}">
              ${subs.map(sk => {
                const sub = subjectMap[sk];
                if (!sub) return '';
                const hasVideo = !!videos[`${yr.id}__${sk}`];
                const isActive = currentSel.yearId===yr.id && currentSel.subjectKey===sk;
                return `<div class="tree-row l3 ${isActive?'active':''}" onclick="selectLeaf('${school.id}','${yr.id}','${sk}')">
                  <i class="ti ${sub.icon} row-icon"></i>
                  <span class="row-label">${sub.label}</span>
                  ${hasVideo?'<i class="ti ti-circle-filled" style="font-size:6px;color:var(--accent);margin-left:auto;flex-shrink:0;"></i>':''}
                </div>`;
              }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(node);
  });
}

function toggleTree(row, id) {
  const isOpening = !row.classList.contains('open');
  const parent = row.parentElement.parentElement;
  parent.querySelectorAll(':scope > div > .tree-row').forEach(sib => {
    if (sib !== row && sib.classList.contains('open')) {
      sib.classList.remove('open');
      const m = sib.getAttribute('onclick').match(/'([^']+)'\)/);
      if (m) {
        const el = document.getElementById(m[1]);
        if (el) {
          el.querySelectorAll('.tree-row.open').forEach(r=>r.classList.remove('open'));
          el.querySelectorAll('.tree-children.open').forEach(c=>c.classList.remove('open'));
          el.classList.remove('open');
        }
      }
    }
  });
  if (isOpening) {
    row.classList.add('open');
    const ch = document.getElementById(id);
    if (ch) ch.classList.add('open');
  } else {
    row.classList.remove('open');
    const ch = document.getElementById(id);
    if (ch) {
      ch.querySelectorAll('.tree-row.open').forEach(r=>r.classList.remove('open'));
      ch.querySelectorAll('.tree-children.open').forEach(c=>c.classList.remove('open'));
      ch.classList.remove('open');
    }
  }
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

function selectLeaf(schoolId, yearId, subjectKey) {
  currentSel = { schoolId, yearId, subjectKey };
  renderTree();
  applySelection();
  // スマホのときは選択後にサイドバーを閉じる
  if (window.innerWidth <= 640) toggleSidebar();
}

function applySelection() {
  const school = schools.find(s=>s.id===currentSel.schoolId);
  const yr = school && school.years.find(y=>y.id===currentSel.yearId);
  const sub = subjectMap[currentSel.subjectKey];
  document.getElementById('bc-school').textContent = school ? school.name : '—';
  document.getElementById('bc-year').textContent = yr ? yr.year+'年度' : '—';
  const badge = document.getElementById('bc-subject-badge');
  if (sub) { badge.textContent=sub.label; badge.style.background=sub.bg; badge.style.color=sub.color; }
  else { badge.textContent='—'; badge.style.background=''; badge.style.color=''; }
  renderVideos();
}

// ── VIDEOS ──
function getVideo() {
  if (!currentSel.yearId || !currentSel.subjectKey) return null;
  return videos[`${currentSel.yearId}__${currentSel.subjectKey}`] || null;
}

function renderVideos() {
  const grid = document.getElementById('videoGrid');
  const sub = subjectMap[currentSel.subjectKey];
  const v = getVideo();
  const query = document.getElementById('searchInput').value.toLowerCase();

  if (!currentSel.subjectKey) {
    grid.innerHTML = `<div class="empty-state"><i class="ti ti-hand-finger"></i><p>左のメニューから科目を選んでください。</p></div>`;
    return;
  }
  if (!v) {
    grid.innerHTML = `<div class="empty-state"><i class="ti ti-video-off"></i><p>この科目の動画はまだ登録されていません。</p></div>`;
    return;
  }
  if (query && !v.title.toLowerCase().includes(query)) {
    grid.innerHTML = `<div class="empty-state"><i class="ti ti-search"></i><p>「${query}」に一致する動画が見つかりません。</p></div>`;
    return;
  }

  const thumbCls = sub ? sub.cls : 'thumb-default';
  const labelColor = sub ? sub.color : '#666';
  const labelBg = sub ? sub.bg : '#eee';
  const embedUrl = v.url
    ? v.url.replace('watch?v=','embed/').replace(/\/file\/d\/([^/]+)\/view.*/,'/file/d/$1/preview')
    : null;

  const screenContent = embedUrl
    ? `<iframe width="100%" height="100%" src="${embedUrl}" frameborder="0" allowfullscreen allow="autoplay" style="position:absolute;inset:0;border:none;"></iframe>`
    : `<div class="thumb-label" style="background:${labelBg};color:${labelColor};">${sub?sub.label:''}</div>
       <div class="play-circle"><i class="ti ti-player-play"></i></div>
       <div class="dur-badge">${v.duration||'--:--'}</div>`;

  grid.innerHTML = `
    <div class="player-display">
      <div class="player-screen ${thumbCls}" style="${embedUrl?'aspect-ratio:16/9;cursor:default;':''}" ${!embedUrl?'onclick="playInline()"':''}>
        ${screenContent}
      </div>
      <div class="player-info">
        <div class="player-info-title">${v.title}</div>
        <div class="player-info-meta">
          <span><i class="ti ti-clock"></i> ${v.duration||'--:--'}</span>
          <span style="margin-left:auto;"><i class="ti ti-eye"></i> ${v.views||0}</span>
        </div>
      </div>
    </div>`;
}

function playInline() {
  const v = getVideo();
  if (!v || !v.url) return;
  const screen = document.querySelector('.player-screen');
  if (!screen) return;
  const embedUrl = v.url.replace('watch?v=','embed/').replace(/\/file\/d\/([^/]+)\/view.*/,'/file/d/$1/preview');
  screen.innerHTML = `<iframe width="100%" height="100%" src="${embedUrl}" frameborder="0" allowfullscreen allow="autoplay" style="position:absolute;inset:0;border:none;"></iframe>`;
  screen.style.aspectRatio = '16/9';
  screen.onclick = null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = '<i class="ti ti-check"></i> '+msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
